theme: jekyll-theme-minimal
title: Yared W. Bekele, PhD
description: Computational Geomechanics
url: "" # Set to your GitHub Pages URL if it's a project page, e.g., "https://username.github.io/repository"
baseurl: "" # Set to repository name if it's a project page, e.g., "/repository"

# Navigation links
nav:
  - title: "About Me"
    url: /about-me/
  - title: "Résumé"
    url: /resume/
  - title: "Research"
    url: /research/
  - title: "Blog"
