  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - parser.py
  - yaredwbekelephd.WordPress.2025-06-04.xml
  - README.md # Or keep if you want it processed
  # You might want to exclude the _pages directory if pages are handled by permalinks
  # or if you prefer not to have them listed directly if not linked.
  # However, for clarity and if they are meant to be browsable, keep them.
  # - _pages/
